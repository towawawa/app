<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIRE計画 - サポートページ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Hiragino Sans', sans-serif;
            line-height: 1.8;
            color: #333;
            background: #f8f9fa;
            padding: 20px;
        }
        .container {

            margin: 0 auto;

        }
        h1 {
            font-size: 2rem;

            color: #FF9500;
        }
        .subtitle {
            color: #666;
            font-size: 1rem;
            margin-bottom: 40px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 300px;
            margin: 0 auto;
        }
        a.btn {
            display: block;
            padding: 14px 24px;
            background: #FF9500;
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
        }
        a.btn.secondary {
            background: #f0f0f0;
            color: #333;
        }
        .contact {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #888;
        }
        .contact a { color: #FF9500; }

</head>

    <div class="container">
